<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PropTok AU</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="rail" aria-label="Property controls">
        <div class="brand">
          <span class="brand-mark">P</span>
          <div>
            <strong>PropTok AU</strong>
            <span>Social property sales</span>
          </div>
        </div>

        <section class="panel search-panel" aria-label="Search filters">
          <div class="panel-head">
            <h2>Buyer Match</h2>
            <span id="matchCount">3 live</span>
          </div>
          <label>
            State
            <select id="stateFilter">
              <option value="all">All Australia</option>
              <option value="NSW">NSW</option>
              <option value="VIC">VIC</option>
              <option value="QLD">QLD</option>
            </select>
          </label>
          <label>
            Budget
            <input id="budgetFilter" type="range" min="700000" max="2800000" step="50000" value="2800000" />
            <span id="budgetValue">$2.8m</span>
          </label>
          <div class="segmented" role="group" aria-label="Buyer intent">
            <button class="active" data-intent="buy">Buy</button>
            <button data-intent="invest">Invest</button>
            <button data-intent="inspect">Inspect</button>
          </div>
        </section>

        <section class="panel saved-panel" aria-label="Saved listings">
          <div class="panel-head">
            <h2>Shortlist</h2>
            <span id="savedCount">0 saved</span>
          </div>
          <div id="savedList" class="saved-list">
            <p class="empty-state">Save homes from the feed.</p>
          </div>
        </section>

        <section class="panel seller-panel" aria-label="Seller metrics">
          <div class="panel-head">
            <h2>Seller Pulse</h2>
            <span>Today</span>
          </div>
          <div class="metric-grid">
            <div>
              <strong id="viewsMetric">42.8k</strong>
              <span>views</span>
            </div>
            <div>
              <strong id="leadsMetric">186</strong>
              <span>leads</span>
            </div>
            <div>
              <strong id="inspectionMetric">31</strong>
              <span>inspections</span>
            </div>
            <div>
              <strong id="offerMetric">9</strong>
              <span>offers</span>
            </div>
          </div>
        </section>
      </aside>

      <section class="phone-stage" aria-label="Vertical property feed">
        <div class="phone">
          <header class="topbar">
            <button class="icon-button" id="prevButton" aria-label="Previous listing">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5l-7 7 7 7M5 12h14" /></svg>
            </button>
            <div>
              <strong>For You</strong>
              <span id="feedLocation">Australia</span>
            </div>
            <button class="icon-button" id="nextButton" aria-label="Next listing">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5l7 7-7 7M5 12h14" /></svg>
            </button>
          </header>

          <div id="feed" class="feed" tabindex="0"></div>
        </div>
      </section>

      <aside class="deal-drawer" aria-label="Listing details">
        <section class="panel">
          <div class="panel-head">
            <h2 id="detailTitle">Listing</h2>
            <span id="detailBadge">Hot</span>
          </div>
          <p id="detailCopy" class="detail-copy"></p>
          <div class="facts" id="facts"></div>
          <div class="agent-card">
            <div class="avatar" id="agentInitials">MS</div>
            <div>
              <strong id="agentName">Agent</strong>
              <span id="agentAgency">Agency</span>
            </div>
            <button id="callButton" class="small-button">Call</button>
          </div>
        </section>

        <section class="panel calculator">
          <div class="panel-head">
            <h2>Offer Lens</h2>
            <span id="depositLabel">20%</span>
          </div>
          <label>
            Deposit
            <input id="depositInput" type="range" min="5" max="40" step="1" value="20" />
          </label>
          <div class="calc-row">
            <span>Cash needed</span>
            <strong id="cashNeeded">$0</strong>
          </div>
          <div class="calc-row">
            <span>Est. repayments</span>
            <strong id="repayments">$0/wk</strong>
          </div>
          <button id="enquiryButton" class="primary-button">Book Inspection</button>
        </section>

        <section class="panel enquiry-panel" id="enquiryPanel" aria-live="polite">
          <div class="panel-head">
            <h2>Buyer Enquiry</h2>
            <span id="enquiryStatus">Ready</span>
          </div>
          <form id="enquiryForm">
            <input name="name" placeholder="Name" required />
            <input name="phone" placeholder="Mobile" required />
            <select name="time">
              <option>Saturday inspection</option>
              <option>Private appointment</option>
              <option>Request contract</option>
            </select>
            <button class="primary-button" type="submit">Send Lead</button>
          </form>
        </section>
      </aside>
    </main>

    <template id="listingTemplate">
      <article class="listing-card">
        <img class="listing-image" alt="" />
        <div class="shade"></div>
        <div class="listing-body">
          <div class="status-row">
            <span class="tag"></span>
            <span class="auction"></span>
          </div>
          <h1></h1>
          <p class="suburb"></p>
          <div class="price"></div>
          <div class="property-stats"></div>
        </div>
        <div class="action-stack">
          <button class="round-action save-action" aria-label="Save listing">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21l-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" /></svg>
            <span>Save</span>
          </button>
          <button class="round-action share-action" aria-label="Copy listing link">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7M16 6l-4-4-4 4M12 2v14" /></svg>
            <span>Share</span>
          </button>
          <button class="round-action inspect-action" aria-label="Book inspection">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" /></svg>
            <span>Inspect</span>
          </button>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
